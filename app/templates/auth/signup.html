{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join SkillSphere and start tracking your skills</p>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" class="form-control" placeholder="Min 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
{% endblock %}
